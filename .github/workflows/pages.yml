name: Deploy GitHub Pages site

# Bare-bones static landing page living in site/. Deploys via the
# official actions/deploy-pages flow. Pages "Source" must be
# "GitHub Actions" — the configure-pages step enables it if needed.
# Custom domain (querykey.emmaleonhart.com) comes from site/CNAME,
# which GitHub picks up from the deployed artifact. DNS is configured
# at the registrar, outside this repo.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
