name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting
        run: |
          pip install flake8
          flake8 backend/ --max-line-length=120 --ignore=E501,W503,E402

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: python-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Package Python backend with PyInstaller
        run: python build_backend.py

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npx vitest run --exclude '**/integration*'

      - name: Run integration tests
        run: npx vitest run tests/frontend/integration.test.ts

      - name: Build Electron installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: tojo-assistant-installer
          path: dist/*.exe
          retention-days: 30

      - name: Upload backend bundle (debug)
        uses: actions/upload-artifact@v4
        with:
          name: tojo-backend-bundle
          path: dist/backend/
          retention-days: 7
